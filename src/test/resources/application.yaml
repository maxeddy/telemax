spring:
  application:
    name: telemax
  datasource:
    url: "jdbc:sqlite:build/test-telemax.db"
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-on-validation-error: true
