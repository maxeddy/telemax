<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemax - Login</title>
    <link rel="stylesheet" th:href="@{/css/telemax.css}">
</head>
<body>
    <div class="login-container">
        <h2>Telemax Login</h2>
        <div class="error-msg" th:if="${param.error}">Invalid username or password.</div>
        <div class="logout-msg" th:if="${param.logout}">You have been logged out.</div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password">
            </div>
            <button type="submit">Log in</button>
        </form>
    </div>
</body>
</html>
