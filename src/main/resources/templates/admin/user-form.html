<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemax - Create User</title>
    <link rel="stylesheet" th:href="@{/css/telemax.css}">
</head>
<body>
    <div class="admin-container">
        <h2>Create User</h2>
        <div class="admin-nav">
            <a th:href="@{/admin/users}" class="btn">&larr; Back to Users</a>
        </div>
        <div class="error-msg" th:if="${error}" th:text="${error}"></div>
        <form class="admin-form" th:action="@{/admin/users/create}" th:object="${userForm}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" maxlength="50" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" minlength="8" required>
            </div>
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" th:field="*{role}" required>
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>
            <div>
                <button type="submit" class="btn btn-primary">Create User</button>
                <a th:href="@{/admin/users}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
