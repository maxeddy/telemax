<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:if="${isEdit}">Telemax - Edit Page</title>
    <title th:if="${!isEdit}">Telemax - Create Page</title>
    <link rel="stylesheet" th:href="@{/css/telemax.css}">
</head>
<body>
    <div class="admin-container">
        <h2 th:text="${isEdit} ? 'Edit Page ' + ${pageForm.pageNumber} : 'Create Page'"></h2>
        <div class="admin-nav">
            <a th:href="@{/admin}" class="btn">&larr; Back to Pages</a>
        </div>
        <div class="error-msg" th:if="${error}" th:text="${error}"></div>
        <form class="admin-form"
              th:action="${isEdit} ? @{/admin/{pn}/edit(pn=${pageForm.pageNumber})} : @{/admin/create}"
              th:object="${pageForm}"
              method="post">
            <div class="form-group">
                <label for="pageNumber">Page Number (100-999)</label>
                <input type="number" id="pageNumber" th:field="*{pageNumber}" min="100" max="999"
                       th:readonly="${isEdit}" required>
            </div>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" th:field="*{title}" maxlength="20" required>
                <span class="inline-error" id="title-error" style="display: none;">Title must be 20 characters or less.</span>
            </div>
            <h3 style="color: #ffff00; font-family: monospace; font-size: 16px; margin: 20px 0 12px;">Paragraphs</h3>
            <div id="paragraphs-container">
                <div class="paragraph-group" th:each="paragraph, stat : *{paragraphs}">
                    <div class="paragraph-header">
                        <span th:text="'Paragraph ' + (${stat.index} + 1)"></span>
                        <button type="button" class="btn-small btn-delete remove-paragraph">Remove</button>
                    </div>
                    <div class="form-group">
                        <label th:for="'paragraphs' + ${stat.index} + '.text'">Text</label>
                        <textarea th:id="'paragraphs' + ${stat.index} + '.text'"
                                  th:name="'paragraphs[' + ${stat.index} + '].text'"
                                  th:text="${paragraph.text}"></textarea>
                    </div>
                    <div class="checkbox-group">
                        <input type="hidden" th:name="'_paragraphs[' + ${stat.index} + '].hasBullet'" value="on">
                        <input type="checkbox"
                               th:id="'paragraphs' + ${stat.index} + '.hasBullet'"
                               th:name="'paragraphs[' + ${stat.index} + '].hasBullet'"
                               value="true"
                               th:checked="${paragraph.hasBullet}">
                        <label th:for="'paragraphs' + ${stat.index} + '.hasBullet'">Show bullet</label>
                    </div>
                </div>
            </div>
            <button type="button" id="add-paragraph" class="btn btn-add">+ Add Paragraph</button>
            <div>
                <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Update Page' : 'Create Page'"></button>
                <a th:href="@{/admin}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
    <script th:src="@{/js/admin.js}"></script>
    <script>
        document.getElementById('title').addEventListener('input', function() {
            document.getElementById('title-error').style.display = this.value.length > 19 ? '' : 'none';
        });
    </script>
</body>
</html>
