<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemax - Admin Pages</title>
    <link rel="stylesheet" th:href="@{/css/telemax.css}">
</head>
<body>
    <div class="admin-container">
        <h2>Manage Pages</h2>
        <div class="admin-nav">
            <a th:href="@{/admin/pages/create}" class="btn">+ Create Page</a>
            <a th:href="@{/pages}" class="btn">View Pages</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
        <div class="success-msg" th:if="${success}" th:text="${success}"></div>
        <div class="error-msg" th:if="${error}" th:text="${error}"></div>
        <table class="page-table" th:if="${!pages.isEmpty()}">
            <thead>
                <tr>
                    <th>Page #</th>
                    <th>Title</th>
                    <th>Created by</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="page : ${pages}">
                    <td>
                        <a th:href="@{/pages/{pn}(pn=${page.pageNumber})}" th:text="${page.pageNumber}"></a>
                    </td>
                    <td th:text="${page.title}"></td>
                    <td th:text="${page.createdBy}"></td>
                    <td class="actions">
                        <a th:href="@{/admin/pages/{pn}/edit(pn=${page.pageNumber})}" class="btn-small btn-edit">Edit</a>
                        <form th:action="@{/admin/pages/{pn}/delete(pn=${page.pageNumber})}" method="post"
                              onsubmit="return confirm('Delete this page?')">
                            <button type="submit" class="btn-small btn-delete">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <p th:if="${pages.isEmpty()}" style="color: #888; font-family: monospace;">No pages yet. Create one!</p>
    </div>
</body>
</html>
