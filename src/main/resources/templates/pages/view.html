<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title th:text="'Telemax - ' + ${page.title}">Telemax</title>
    <link rel="stylesheet" th:href="@{/css/telemax.css}">
</head>
<body class="page-view">
    <div class="container" id="page-container"
         th:data-prev="${prevPage}" th:data-next="${nextPage}">
        <div class="pre-header">
            <span class="pre-header-title">Telemax</span>
            <span class="pre-header-page-number" th:text="${page.pageNumber}"></span>
        </div>

        <div class="yellow-line"></div>

        <div class="header">
            <h1 th:text="${page.title}"></h1>
        </div>

        <div class="yellow-line"></div>

        <div class="content">
            <p class="paragraph" th:each="para : ${paragraphs}">
                <span class="bullet" th:if="${para.hasBullet}"></span>
                <th:block th:text="${para.text}"></th:block>
            </p>
        </div>

        <div class="yellow-line bottom"></div>
    </div>
    <script>
        (function() {
            var container = document.getElementById('page-container');
            var startX = 0;
            var startY = 0;

            container.addEventListener('touchstart', function(e) {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: true });

            container.addEventListener('touchend', function(e) {
                var dx = e.changedTouches[0].clientX - startX;
                var dy = e.changedTouches[0].clientY - startY;
                if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;

                if (dx < 0 && container.dataset.next) {
                    window.location.href = '/' + container.dataset.next;
                } else if (dx > 0 && container.dataset.prev) {
                    window.location.href = '/' + container.dataset.prev;
                }
            }, { passive: true });
        })();
    </script>
</body>
</html>
