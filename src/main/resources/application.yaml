telemax:
  viewer-password: telemax

spring:
  application:
    name: telemax
  datasource:
    url: jdbc:sqlite:./data/telemax.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
